<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PretestBoard — 学前测看板 · AI编程学习助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script
      crossorigin
      src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
    <style>
      :root {
        --bg-canvas: #fffdf4;
        --text-primary: #2c1608;
        --text-heading: #be8944;
        --blue: #0066cc;
        --blue-light: #8cc0f8;
        --blue-lighter: #c8e2ff;
        --blue-mist: #e7f4ff;
        --yellow: #ffe083;
        --yellow-light: #ffecb3;
        --yellow-lighter: #fff6db;
        --yellow-mist: #fffbed;
        --orange: #fcac7d;
        --orange-light: #fdbc97;
        --orange-lighter: #fbd9c4;
        --orange-mist: #f9ebe4;
        --brown-gold: #be8944;
        --brown-light: #c4a882;
        --brown-medium: #8b6347;
        --brown-dark: #5c3d2e;
        --brown-deep: #271307;
        --warn-bg: #fbddd6;
        --warn-text: #c84a2b;
        --success-bg: #effce3;
        --success-text: #478211;
        --shadow-soft:
          6px 6px 12px rgba(228, 200, 166, 0.3),
          -6px -6px 12px rgba(255, 255, 255, 0.8);
        --shadow-hover:
          8px 8px 16px rgba(228, 200, 166, 0.4),
          -8px -8px 16px rgba(255, 255, 255, 0.9);
        --shadow-inner:
          inset 4px 4px 8px rgba(228, 200, 166, 0.3),
          inset -4px -4px 8px rgba(255, 255, 255, 0.8);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Inter", system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text-primary);
        background-color: var(--bg-canvas);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
        height: 100vh;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes float1 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-20px, 15px) scale(1.05);
        }
      }
      @keyframes float2 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(15px, -20px) scale(1.08);
        }
      }
      @keyframes float3 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-10px, -15px) scale(1.03);
        }
      }
      @keyframes pulseGlow {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(255, 224, 131, 0.25);
        }
        50% {
          box-shadow: 0 0 40px rgba(255, 224, 131, 0.5);
        }
      }
      @keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes breathe {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        10%,
        30%,
        50%,
        70%,
        90% {
          transform: translateX(-4px);
        }
        20%,
        40%,
        60%,
        80% {
          transform: translateX(4px);
        }
      }
      .shake-anim {
        animation: shake 0.4s ease;
      }
      .pretest-page {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          rgba(251, 180, 138, 0.35) 0%,
          rgba(251, 224, 143, 0.4) 35%,
          rgba(247, 251, 199, 0.38) 55%,
          rgba(131, 191, 254, 0.3) 100%
        );
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        overflow: hidden;
        animation: fadeIn 0.5s ease;
      }
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }
      .blob-orange {
        width: 450px;
        height: 450px;
        background: radial-gradient(
          circle,
          rgba(252, 172, 125, 0.14) 0%,
          transparent 70%
        );
        top: -120px;
        right: -80px;
        animation: float1 8s ease-in-out infinite;
      }
      .blob-blue {
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(140, 192, 248, 0.12) 0%,
          transparent 70%
        );
        bottom: -100px;
        left: -60px;
        animation: float2 10s ease-in-out infinite;
      }
      .blob-yellow {
        width: 420px;
        height: 420px;
        background: radial-gradient(
          circle,
          rgba(255, 224, 131, 0.16) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: float3 12s ease-in-out infinite;
      }
      .pretest-card {
        position: relative;
        width: min(650px, calc(100vw - 48px));
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
        animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
        z-index: 1;
      }
      .pretest-card:hover {
        box-shadow: var(--shadow-hover);
      }
      .pretest-card.narrow {
        width: min(650px, calc(100vw - 48px));
      }
      .accent-bar {
        height: 4px;
        width: 100%;
        background: linear-gradient(
          90deg,
          #fcac7d 0%,
          #ffe083 50%,
          #8cc0f8 100%
        );
      }
      .card-content {
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .brand-icon {
        width: 64px;
        height: 64px;
        border-radius: 20px;
        background: linear-gradient(
          135deg,
          var(--yellow-lighter),
          var(--yellow)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: var(--shadow-soft);
        margin: 0 auto;
        animation: pulseGlow 3s ease-in-out infinite;
      }
      .pretest-header {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .pretest-title {
        font-size: 28px;
        font-weight: 800;
        color: var(--brown-deep);
        letter-spacing: -0.5px;
      }
      .pretest-subtitle {
        font-size: 15px;
        color: var(--brown-dark);
        font-weight: 400;
        line-height: 1.6;
      }
      .error-box {
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 14px;
        padding: 12px 16px;
        background: var(--warn-bg);
        color: var(--warn-text);
        font-size: 14px;
        font-weight: 500;
        border-left: 3px solid var(--warn-text);
        line-height: 1.4;
      }
      .error-icon {
        font-size: 18px;
        flex-shrink: 0;
      }
      .submit-btn {
        width: 100%;
        height: 52px;
        border: none;
        border-radius: 9999px;
        background: linear-gradient(135deg, var(--yellow), var(--orange));
        color: var(--brown-dark);
        font-family: inherit;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.3px;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(252, 172, 125, 0.35);
        transition: all 220ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .submit-btn:hover:not(:disabled) {
        background: linear-gradient(135deg, #fdbc97, #fcac7d);
        box-shadow: 0 6px 24px rgba(252, 172, 125, 0.45);
        transform: translateY(-1px);
      }
      .submit-btn:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(252, 172, 125, 0.25);
      }
      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .intro-highlights {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }
      .highlight-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 16px;
        border: 1px solid rgba(228, 200, 166, 0.3);
        background: var(--bg-canvas);
        box-shadow: var(--shadow-soft);
        font-size: 14px;
        font-weight: 600;
        color: var(--brown-medium);
        transition: all 220ms ease;
      }
      .highlight-chip:hover {
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
        border-color: rgba(228, 200, 166, 0.45);
      }
      .generating-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        padding: 48px 0;
      }
      .generating-spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 4px solid var(--bg-canvas);
        border-top-color: var(--orange);
        animation: spinner 0.8s linear infinite;
      }
      .generating-text {
        font-size: 16px;
        color: var(--brown-dark);
        text-align: center;
        animation: breathe 2s ease-in-out infinite;
        line-height: 1.6;
        white-space: pre-wrap;
      }
      .quiz-header {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .quiz-header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .quiz-title-area {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .quiz-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--brown-deep);
      }
      .quiz-progress {
        font-size: 14px;
        font-weight: 600;
        color: var(--brown-medium);
      }
      .quiz-progress-bar {
        width: 100%;
        height: 8px;
        border-radius: 9999px;
        background: rgba(196, 168, 130, 0.15);
        box-shadow:
          inset 2px 2px 4px rgba(228, 200, 166, 0.3),
          inset -2px -2px 4px rgba(255, 255, 255, 0.8);
        overflow: hidden;
      }
      .quiz-progress-fill {
        height: 100%;
        border-radius: 9999px;
        background: linear-gradient(90deg, var(--orange), var(--yellow));
        transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 0 8px rgba(252, 172, 125, 0.4);
      }
      .quiz-end-btn {
        padding: 10px 24px;
        border-radius: 9999px;
        border: none;
        background: linear-gradient(
          135deg,
          rgba(229, 240, 253, 0.6),
          rgba(197, 222, 251, 0.9)
        );
        color: var(--blue);
        font-family: inherit;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: var(--shadow-soft);
        transition: all 220ms ease;
        white-space: nowrap;
      }
      .quiz-end-btn:hover {
        background: linear-gradient(
          135deg,
          var(--blue-mist),
          var(--blue-lighter)
        );
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
      }
      .quiz-end-btn:active {
        transform: translateY(0);
        box-shadow: var(--shadow-inner);
      }
      .knowledge-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        border-radius: 9999px;
        background: linear-gradient(135deg, #fcac7d, #ffe083);
        color: #fff;
        font-size: 17px;
        font-weight: 700;
        text-shadow: 0 1px 2px rgba(139, 99, 71, 0.3);
        box-shadow: 0 2px 8px rgba(252, 172, 125, 0.35);
      }
      .quiz-stem {
        font-size: 18px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.6;
      }
      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .quiz-option {
        display: flex;
        align-items: center;
        gap: 16px;
        width: 100%;
        padding: 14px 18px;
        border-radius: 16px;
        border: 2px solid var(--yellow-light);
        background: var(--bg-canvas);
        box-shadow: var(--shadow-soft);
        font-family: inherit;
        font-size: 15px;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 220ms ease;
        text-align: left;
      }
      .quiz-option:hover {
        background: var(--yellow-mist);
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
      }
      .quiz-option.selected {
        border-color: var(--yellow);
        background: var(--yellow-lighter);
        box-shadow:
          var(--shadow-inner),
          0 0 0 3px rgba(255, 224, 131, 0.18);
        transform: translateY(0);
      }
      .option-label {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          var(--yellow-lighter),
          var(--yellow-light)
        );
        box-shadow:
          3px 3px 6px rgba(228, 200, 166, 0.25),
          -3px -3px 6px rgba(255, 255, 255, 0.9);
        font-size: 14px;
        font-weight: 700;
        color: var(--brown-medium);
        flex-shrink: 0;
        transition: all 200ms ease;
      }
      .quiz-option.selected .option-label {
        background: linear-gradient(135deg, var(--yellow-light), var(--yellow));
        color: var(--brown-dark);
        box-shadow:
          inset 2px 2px 4px rgba(0, 0, 0, 0.1),
          inset -2px -2px 4px rgba(255, 255, 255, 0.3);
      }
      .option-text {
        flex: 1;
        line-height: 1.5;
        font-weight: 500;
      }
      .confidence-section {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-top: 8px;
        padding-top: 20px;
        border-top: 1px dashed rgba(196, 168, 130, 0.3);
      }
      .confidence-label {
        font-size: 15px;
        font-weight: 700;
        color: var(--brown-deep);
      }
      .confidence-buttons {
        display: flex;
        gap: 12px;
      }
      .confidence-btn {
        flex: 1;
        padding: 14px 16px;
        border-radius: 9999px;
        border: none;
        font-family: inherit;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 220ms ease;
        box-shadow: var(--shadow-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .confidence-btn.dont-know {
        color: var(--warn-text);
        background: linear-gradient(
          135deg,
          rgba(251, 221, 214, 0.6),
          rgba(255, 212, 202, 0.9)
        );
      }
      .confidence-btn.dont-know:hover {
        background: linear-gradient(
          135deg,
          rgba(251, 221, 214, 0.8),
          rgb(252, 189, 177)
        );
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
      }
      .confidence-btn.dont-know.active {
        background: linear-gradient(135deg, #fbddd6, #f5b8ac);
        box-shadow:
          var(--shadow-inner),
          inset 0 0 0 2px rgba(200, 74, 43, 0.2);
        transform: translateY(0);
      }
      .confidence-btn.uncertain {
        color: #b8860b;
        background: linear-gradient(
          135deg,
          rgba(252, 231, 166, 0.63),
          rgba(255, 237, 166, 0.9)
        );
      }
      .confidence-btn.uncertain:hover {
        background: linear-gradient(
          135deg,
          rgba(255, 236, 179, 0.8),
          rgb(255, 223, 126)
        );
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
      }
      .confidence-btn.uncertain.active {
        background: linear-gradient(135deg, var(--yellow-light), var(--yellow));
        box-shadow:
          var(--shadow-inner),
          inset 0 0 0 2px rgba(247, 215, 121, 0.4);
        transform: translateY(0);
      }
      .confidence-btn.know {
        color: var(--blue);
        background: linear-gradient(
          135deg,
          rgba(229, 240, 253, 0.6),
          rgba(197, 222, 251, 0.9)
        );
      }
      .confidence-btn.know:hover {
        background: linear-gradient(
          135deg,
          rgba(190, 224, 255, 0.85),
          var(--blue-mist)
        );
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
      }
      .confidence-btn.know.active {
        background: linear-gradient(
          135deg,
          var(--blue-mist),
          var(--blue-lighter)
        );
        box-shadow:
          var(--shadow-inner),
          inset 0 0 0 2px rgba(0, 102, 204, 0.2);
        transform: translateY(0);
      }
      .action-bar {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .action-bar .submit-btn {
        flex: 1;
      }
      @media (max-width: 640px) {
        .pretest-page {
          padding: 16px;
        }
        .card-content {
          padding: 28px 24px;
          gap: 20px;
        }
        .pretest-title {
          font-size: 22px;
        }
        .brand-icon {
          width: 52px;
          height: 52px;
          font-size: 24px;
          border-radius: 16px;
        }
        .confidence-buttons {
          flex-direction: column;
        }
        .action-bar {
          flex-direction: column;
        }
        .intro-highlights {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useCallback } = React;
      const mockQuestions = [
        {
          id: "q_1",
          question: "以下哪个是 Python 中定义函数的关键字？",
          options: ["function", "def", "func", "define"],
          answer: "def",
          knowledge_point: "函数定义",
        },
        {
          id: "q_2",
          question: "在 Python 中，以下哪个数据类型是不可变的？",
          options: [
            "list（列表）",
            "dict（字典）",
            "tuple（元组）",
            "set（集合）",
          ],
          answer: "tuple（元组）",
          knowledge_point: "数据类型",
        },
        {
          id: "q_3",
          question: "以下代码的输出是什么？\n\nprint(type([]))",
          options: [
            "<class 'array'>",
            "<class 'list'>",
            "<class 'tuple'>",
            "<class 'set'>",
          ],
          answer: "<class 'list'>",
          knowledge_point: "类型检查",
        },
        {
          id: "q_4",
          question: "Python 中用于捕获异常的关键字组合是？",
          options: [
            "try...catch",
            "try...except",
            "begin...rescue",
            "do...catch",
          ],
          answer: "try...except",
          knowledge_point: "异常处理",
        },
        {
          id: "q_5",
          question: "以下哪种方法可以将列表 [3, 1, 2] 按升序排列？",
          options: [
            "[3,1,2].order()",
            "[3,1,2].sort()",
            "sorted([3,1,2])",
            "B 和 C 都可以",
          ],
          answer: "B 和 C 都可以",
          knowledge_point: "列表排序",
        },
      ];

      function PretestBoard() {
        const [status, setStatus] = useState("intro");
        const [currentIndex, setCurrentIndex] = useState(0);
        const [selectedAnswer, setSelectedAnswer] = useState(null);
        const [confidence, setConfidence] = useState(null);
        const [loadingText, setLoadingText] = useState("");
        const [errorMessage] = useState(null);
        const currentQuestion = mockQuestions[currentIndex];
        const isLastQuestion = currentIndex === mockQuestions.length - 1;

        const handleStartQuiz = useCallback(async () => {
          setStatus("loading_questions");
          setLoadingText("正在联系 AI 引擎生成专属考题...");
          await new Promise((r) => setTimeout(r, 1200));
          setLoadingText("正在分析你的学习画像...");
          await new Promise((r) => setTimeout(r, 1000));
          setLoadingText("正在生成个性化学前测题目...");
          await new Promise((r) => setTimeout(r, 1200));
          setCurrentIndex(0);
          setSelectedAnswer(null);
          setConfidence(null);
          setStatus("testing");
        }, []);

        const handleSelectAnswer = useCallback((o) => {
          setSelectedAnswer(o);
        }, []);
        const handleSelectConfidence = useCallback((l) => {
          setConfidence(l);
        }, []);

        const handleNext = useCallback(async () => {
          if (!selectedAnswer || !confidence) return;
          if (isLastQuestion) {
            setStatus("generating");
            setLoadingText(
              "AI 正在基于你的画像与答题数据，\n流式编排专属学习路线...",
            );
            await new Promise((r) => setTimeout(r, 2500));
            alert("✅ 学习计划生成成功！（这是前端演示）");
            setStatus("intro");
          } else {
            setCurrentIndex((p) => p + 1);
            setSelectedAnswer(null);
            setConfidence(null);
          }
        }, [selectedAnswer, confidence, isLastQuestion]);

        const handleEndQuiz = useCallback(async () => {
          setStatus("generating");
          setLoadingText("AI 正在根据已答题目生成学习计划...");
          await new Promise((r) => setTimeout(r, 2500));
          alert("✅ 学习计划生成成功！（这是前端演示）");
          setStatus("intro");
        }, []);

        const renderIntro = () => (
          <div className="pretest-card">
            <div className="accent-bar" />
            <div className="card-content">
              <div className="brand-icon">📝</div>
              <div className="pretest-header">
                <h2 className="pretest-title">学前能力测评</h2>
                <p className="pretest-subtitle">
                  测验将用于生成你的专属学习路线，预计用时约 2 分钟
                </p>
              </div>
              <div className="intro-highlights">
                <div className="highlight-chip">
                  <span style={{ fontSize: 18 }}>🎯</span>
                  <span>AI 智能出题</span>
                </div>
                <div className="highlight-chip">
                  <span style={{ fontSize: 18 }}>⏱️</span>
                  <span>约 2 分钟</span>
                </div>
                <div className="highlight-chip">
                  <span style={{ fontSize: 18 }}>📊</span>
                  <span>精准画像</span>
                </div>
              </div>
              {errorMessage && (
                <div className="error-box shake-anim">
                  <span className="error-icon">⚠️</span>
                  <span>{errorMessage}</span>
                </div>
              )}
              <button
                type="button"
                className="submit-btn"
                onClick={handleStartQuiz}
              >
                🚀 开始测验
              </button>
            </div>
          </div>
        );

        const renderLoading = () => (
          <div className="pretest-card narrow">
            <div className="accent-bar" />
            <div className="card-content">
              <div className="generating-container">
                <div className="generating-spinner" />
                <p className="generating-text">{loadingText}</p>
              </div>
            </div>
          </div>
        );

        const renderTesting = () => (
          <div className="pretest-card">
            <div className="accent-bar" />
            <div className="card-content">
              <div className="brand-icon">📝</div>
              <div className="quiz-header">
                <div className="quiz-header-top">
                  <div className="quiz-title-area">
                    <span className="quiz-title">学前测验进行中</span>
                    <span className="quiz-progress">
                      {currentIndex + 1} / {mockQuestions.length}
                    </span>
                  </div>
                  <button
                    type="button"
                    className="quiz-end-btn"
                    onClick={handleEndQuiz}
                  >
                    提前结束并生成计划
                  </button>
                </div>
                <div className="quiz-progress-bar">
                  <div
                    className="quiz-progress-fill"
                    style={{
                      width: `${((currentIndex + 1) / mockQuestions.length) * 100}%`,
                    }}
                  />
                </div>
              </div>
              <div>
                <span className="knowledge-tag">
                  {currentQuestion.knowledge_point}
                </span>
              </div>
              <div className="quiz-stem" style={{ whiteSpace: "pre-wrap" }}>
                {currentQuestion.question}
              </div>
              <div className="quiz-options">
                {currentQuestion.options.map((option, index) => (
                  <button
                    key={index}
                    type="button"
                    className={`quiz-option ${selectedAnswer === option ? "selected" : ""}`}
                    onClick={() => handleSelectAnswer(option)}
                  >
                    <span className="option-label">
                      {String.fromCharCode(65 + index)}
                    </span>
                    <span className="option-text">{option}</span>
                  </button>
                ))}
              </div>
              <div className="confidence-section">
                <label className="confidence-label">
                  你对这道题的把握程度：
                </label>
                <div className="confidence-buttons">
                  <button
                    type="button"
                    className={`confidence-btn dont-know ${confidence === "我不会" ? "active" : ""}`}
                    onClick={() => handleSelectConfidence("我不会")}
                  >
                    我不会
                  </button>
                  <button
                    type="button"
                    className={`confidence-btn uncertain ${confidence === "我不确定" ? "active" : ""}`}
                    onClick={() => handleSelectConfidence("我不确定")}
                  >
                    我不确定
                  </button>
                  <button
                    type="button"
                    className={`confidence-btn know ${confidence === "我会" ? "active" : ""}`}
                    onClick={() => handleSelectConfidence("我会")}
                  >
                    我会
                  </button>
                </div>
              </div>
              <div className="action-bar">
                <button
                  type="button"
                  className="submit-btn"
                  disabled={!selectedAnswer || !confidence}
                  onClick={handleNext}
                >
                  {isLastQuestion ? "✨ 提交并生成专属计划" : "➡️ 下一题"}
                </button>
              </div>
            </div>
          </div>
        );

        const renderGenerating = () => (
          <div className="pretest-card narrow">
            <div className="accent-bar" />
            <div className="card-content">
              <div className="generating-container">
                <div className="generating-spinner" />
                <p className="generating-text">{loadingText}</p>
              </div>
            </div>
          </div>
        );

        return (
          <div className="pretest-page">
            <div className="blob blob-orange" />
            <div className="blob blob-blue" />
            <div className="blob blob-yellow" />
            {status === "intro" && renderIntro()}
            {status === "loading_questions" && renderLoading()}
            {status === "testing" && renderTesting()}
            {status === "generating" && renderGenerating()}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<PretestBoard />);
    </script>
  </body>
</html>
