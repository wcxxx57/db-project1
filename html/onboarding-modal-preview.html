<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnboardingModal — 用户画像引导弹窗 · AI编程学习助手</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- React 18 CDN (stable UMD build) -->
    <script
      crossorigin
      src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"
    ></script>
    <!-- Babel Standalone for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>

    <style>
      /* =============================================
       N2W Design System — CSS Tokens
       ============================================= */
      :root {
        /* === 基础 === */
        --bg-canvas: #fffdf4;
        --text-primary: #2c1608;
        --text-heading: #be8944;

        /* === N2W 蓝色梯度 === */
        --blue: #0066cc;
        --blue-light: #8cc0f8;
        --blue-lighter: #c8e2ff;
        --blue-mist: #e7f4ff;

        /* === N2W 黄色梯度 === */
        --yellow: #ffe083;
        --yellow-light: #ffecb3;
        --yellow-lighter: #fff6db;
        --yellow-mist: #fffbed;

        /* === N2W 橙色梯度 === */
        --orange: #fcac7d;
        --orange-light: #fdbc97;
        --orange-lighter: #fbd9c4;
        --orange-mist: #f9ebe4;

        /* === 项目棕色层次 === */
        --brown-gold: #be8944; /* 项目灵魂色 */
        --brown-light: #c4a882; /* 边框/分隔线 */
        --brown-medium: #8b6347; /* 次级标题/标签 */
        --brown-dark: #5c3d2e; /* hover加深 */
        --brown-deep: #271307; /* = text-primary，正文色 */

        /* === 警告 === */
        --warn-bg: #fbddd6;
        --warn-text: #c84a2b;

        /* === 成功 === */
        --success-bg: #effce3;
        --success-text: #478211;

        /* === 微拟态阴影 === */
        --shadow-soft:
          6px 6px 12px rgba(228, 200, 166, 0.3),
          -6px -6px 12px rgba(255, 255, 255, 0.8);
        --shadow-hover:
          8px 8px 16px rgba(228, 200, 166, 0.4),
          -8px -8px 16px rgba(255, 255, 255, 0.9);
        --shadow-inner:
          inset 4px 4px 8px rgba(228, 200, 166, 0.3),
          inset -4px -4px 8px rgba(255, 255, 255, 0.8);
      }

      /* =============================================
       Global Reset
       ============================================= */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter", system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text-primary);
        background-color: var(--bg-canvas);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
        height: 100vh;
      }

      /* =============================================
       Animations
       ============================================= */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        10%,
        30%,
        50%,
        70%,
        90% {
          transform: translateX(-4px);
        }
        20%,
        40%,
        60%,
        80% {
          transform: translateX(4px);
        }
      }

      @keyframes float1 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-20px, 15px) scale(1.05);
        }
      }

      @keyframes float2 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(15px, -20px) scale(1.08);
        }
      }

      @keyframes float3 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-10px, -15px) scale(1.03);
        }
      }

      @keyframes pulse-glow-yellow {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(255, 224, 131, 0.25);
        }
        50% {
          box-shadow: 0 0 40px rgba(255, 224, 131, 0.5);
        }
      }

      @keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      .shake-anim {
        animation: shake 0.4s ease;
      }

      /* =============================================
       Overlay
       ============================================= */
      .onboarding-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        /* N2W 三色渐变：橙 → 黄 → 蓝 */
        background: linear-gradient(
          135deg,
          rgba(251, 180, 138, 0.35) 0%,
          /* N2W 橙 */ rgba(251, 224, 143, 0.4) 35%,
          /* N2W 黄 */ rgba(247, 251, 199, 0.38) 55%,
          /* N2W 黄浅 - 过渡 */ rgba(131, 191, 254, 0.3) 100%
        ); /* N2W 蓝 */
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 9999;
        animation: fadeIn 0.5s ease;
        overflow: hidden;
      }

      /* Decorative Blobs */
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }

      .blob-orange {
        width: 450px;
        height: 450px;
        background: radial-gradient(
          circle,
          rgba(252, 172, 125, 0.18) 0%,
          transparent 70%
        );
        top: -120px;
        right: -80px;
        animation: float1 8s ease-in-out infinite;
      }

      .blob-blue {
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(140, 192, 248, 0.15) 0%,
          transparent 70%
        );
        bottom: -100px;
        left: -60px;
        animation: float2 10s ease-in-out infinite;
      }

      .blob-yellow {
        width: 420px;
        height: 420px;
        background: radial-gradient(
          circle,
          rgba(255, 224, 131, 0.22) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: float3 12s ease-in-out infinite;
      }

      /* =============================================
       Card
       ============================================= */
      .onboarding-card {
        position: relative;
        width: min(650px, calc(100vw - 48px));
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
        animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
      }

      .onboarding-card:hover {
        box-shadow: var(--shadow-hover);
      }

      .onboarding-card.wide {
        width: min(650px, calc(100vw - 48px));
      }

      /* Top accent gradient bar */
      .accent-bar {
        height: 4px;
        background: linear-gradient(
          90deg,
          #fcac7d 0%,
          #ffe083 50%,
          #8cc0f8 100%
        );
        width: 100%;
      }

      .card-content {
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* =============================================
       Brand Icon
       ============================================= */
      .brand-icon {
        width: 64px;
        height: 64px;
        border-radius: 20px;
        background: linear-gradient(
          135deg,
          var(--yellow-lighter) 0%,
          var(--yellow) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: var(--shadow-soft);
        margin: 0 auto;
        animation: pulse-glow-yellow 3s ease-in-out infinite;
      }

      /* =============================================
       Header
       ============================================= */
      .onboarding-header {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .onboarding-title {
        font-size: 26px;
        font-weight: 800;
        color: var(--brown-deep);
        letter-spacing: -0.5px;
      }

      .onboarding-subtitle {
        font-size: 15px;
        color: var(--brown-dark);
        font-weight: 400;
        line-height: 1.5;
      }

      /* =============================================
       Step Indicator
       ============================================= */
      .step-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .step-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--brown-light);
        transition: all 0.3s ease;
      }

      .step-dot.active {
        width: 32px;
        border-radius: 5px;
        background: linear-gradient(
          90deg,
          var(--orange) 0%,
          var(--yellow) 100%
        );
      }

      .step-dot.completed {
        background: var(--success-text);
      }

      /* =============================================
       Form Fields
       ============================================= */
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .field-wrapper {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--brown-medium);
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-icon {
        position: absolute;
        left: 16px;
        font-size: 18px;
        color: var(--brown-medium);
        pointer-events: none;
        transition: color 200ms ease;
        z-index: 1;
      }

      .onboarding-input {
        width: 100%;
        height: 52px;
        border-radius: 16px;
        border: 2px solid transparent;
        padding: 0 16px 0 48px;
        background: var(--bg-canvas);
        color: var(--text-primary);
        font-family: inherit;
        font-size: 15px;
        font-weight: 500;
        box-shadow: var(--shadow-inner);
        transition:
          border-color 200ms ease,
          box-shadow 200ms ease;
        outline: none;
      }

      .onboarding-input.no-icon {
        padding-left: 16px;
      }

      /* Custom Select Dropdown */
      .custom-select {
        position: relative;
        width: 100%;
      }

      .custom-select-trigger {
        width: 100%;
        height: 52px;
        border-radius: 16px;
        border: 2px solid transparent;
        padding: 0 40px 0 48px;
        background: var(--bg-canvas);
        color: var(--text-primary);
        font-family: inherit;
        font-size: 15px;
        font-weight: 500;
        box-shadow: var(--shadow-inner);
        transition:
          border-color 200ms ease,
          box-shadow 200ms ease;
        outline: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        user-select: none;
      }

      .custom-select-trigger:hover {
        border-color: var(--yellow-light);
      }

      .custom-select-trigger.open {
        border-color: var(--yellow);
        box-shadow:
          var(--shadow-inner),
          0 0 0 3px rgba(255, 224, 131, 0.18);
      }

      .custom-select-arrow {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        pointer-events: none;
        transition: transform 250ms ease;
        color: var(--brown-medium);
      }

      .custom-select-trigger.open .custom-select-arrow {
        transform: translateY(-50%) rotate(180deg);
        color: var(--brown-gold);
      }

      @keyframes dropdownSlideIn {
        from {
          opacity: 0;
          transform: translateY(-8px) scaleY(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scaleY(1);
        }
      }

      .custom-select-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        z-index: 100;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow:
          0 8px 32px rgba(139, 99, 71, 0.12),
          0 2px 8px rgba(139, 99, 71, 0.08);
        border: 1.5px solid var(--yellow-light);
        padding: 6px;
        animation: dropdownSlideIn 200ms cubic-bezier(0.16, 1, 0.3, 1);
        transform-origin: top center;
        max-height: 240px;
        overflow-y: auto;
      }

      .custom-select-menu::-webkit-scrollbar {
        width: 6px;
      }

      .custom-select-menu::-webkit-scrollbar-track {
        background: transparent;
      }

      .custom-select-menu::-webkit-scrollbar-thumb {
        background: var(--yellow);
        border-radius: 3px;
      }

      .custom-select-option {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 10px 14px;
        border-radius: 12px;
        border: none;
        background: transparent;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 150ms ease;
        text-align: left;
      }

      .custom-select-option:hover {
        background: var(--yellow-mist);
      }

      .custom-select-option.active {
        background: var(--yellow-lighter);
        font-weight: 600;
      }

      .custom-select-option .check-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        color: var(--brown-gold);
        opacity: 0;
        transition: opacity 150ms ease;
      }

      .custom-select-option.active .check-icon {
        opacity: 1;
      }

      .custom-select-option .option-name {
        flex: 1;
      }

      .onboarding-input::placeholder {
        color: var(--brown-medium);
        font-weight: 400;
      }

      .onboarding-input:focus {
        border-color: var(--yellow);
        box-shadow:
          var(--shadow-inner),
          0 0 0 3px rgba(255, 224, 131, 0.18);
      }

      .input-wrapper:focus-within .input-icon {
        color: var(--brown-gold);
      }

      /* Input with suffix */
      .input-with-suffix {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .input-with-suffix .onboarding-input {
        flex: 1;
      }

      .input-suffix {
        font-size: 15px;
        font-weight: 600;
        color: var(--brown-medium);
        white-space: nowrap;
      }

      /* Textarea */
      .onboarding-textarea {
        width: 100%;
        min-height: 120px;
        border-radius: 16px;
        border: 2px solid transparent;
        padding: 16px;
        background: var(--bg-canvas);
        color: var(--text-primary);
        font-family: inherit;
        font-size: 15px;
        font-weight: 500;
        box-shadow: var(--shadow-inner);
        transition:
          border-color 200ms ease,
          box-shadow 200ms ease;
        outline: none;
        resize: none;
        line-height: 1.5;
      }

      .onboarding-textarea::placeholder {
        color: var(--brown-medium);
        font-weight: 400;
      }

      .onboarding-textarea:focus {
        border-color: var(--yellow);
        box-shadow:
          var(--shadow-inner),
          0 0 0 3px rgba(255, 224, 131, 0.18);
      }

      /* =============================================
       Error Message
       ============================================= */
      .error-box {
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 14px;
        padding: 12px 16px;
        background: var(--warn-bg);
        color: var(--warn-text);
        font-size: 14px;
        font-weight: 500;
        border-left: 3px solid var(--warn-text);
        line-height: 1.4;
      }

      .error-icon {
        font-size: 18px;
        flex-shrink: 0;
      }

      /* =============================================
       Submit Button
       ============================================= */
      .submit-btn {
        width: 100%;
        height: 52px;
        border: none;
        border-radius: 9999px;
        background: linear-gradient(
          135deg,
          var(--yellow) 0%,
          var(--orange) 100%
        );
        color: var(--brown-dark);
        font-family: inherit;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.3px;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(252, 172, 125, 0.35);
        transition: all 220ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .submit-btn:hover:not(:disabled) {
        background: linear-gradient(135deg, #fdbc97 0%, #fcac7d 100%);
        box-shadow: 0 6px 24px rgba(252, 172, 125, 0.45);
        transform: translateY(-1px);
      }

      .submit-btn:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(252, 172, 125, 0.25);
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .btn-spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spinner 0.7s linear infinite;
      }

      /* =============================================
       Loading / Generating State
       ============================================= */
      .generating-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        padding: 48px 0;
      }

      .generating-spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 4px solid var(--bg-canvas);
        border-top-color: var(--orange);
        animation: spinner 0.8s linear infinite;
      }

      .generating-text {
        font-size: 16px;
        color: var(--brown-dark);
        text-align: center;
        animation: breathe 2s ease-in-out infinite;
      }

      /* =============================================
       Quiz Mode
       ============================================= */
      .quiz-header {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .quiz-header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .quiz-progress {
        font-size: 14px;
        font-weight: 600;
        color: var(--brown-medium);
      }

      /* Progress Bar */
      .quiz-progress-bar {
        width: 100%;
        height: 8px;
        border-radius: 9999px;
        background: rgba(196, 168, 130, 0.15);
        box-shadow:
          inset 2px 2px 4px rgba(228, 200, 166, 0.3),
          inset -2px -2px 4px rgba(255, 255, 255, 0.8);
        overflow: hidden;
      }

      .quiz-progress-fill {
        height: 100%;
        border-radius: 9999px;
        background: linear-gradient(
          90deg,
          var(--orange) 0%,
          var(--yellow) 100%
        );
        transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 0 8px rgba(252, 172, 125, 0.4);
      }

      /* End Button — N2W 浅蓝色风格 */
      .quiz-end-btn {
        padding: 10px 24px;
        border-radius: 9999px;
        border: none;
        background: linear-gradient(
          135deg,
          rgba(229, 240, 253, 0.6) 0%,
          rgba(197, 222, 251, 0.9) 100%
        );
        color: var(--blue);
        font-family: inherit;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: var(--shadow-soft);
        transition: all 220ms ease;
        letter-spacing: 0.3px;
      }

      .quiz-end-btn:hover {
        background: linear-gradient(
          135deg,
          var(--blue-mist) 0%,
          var(--blue-lighter) 100%
        );
        color: var(--blue);
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
      }

      .quiz-end-btn:active {
        transform: translateY(0);
        box-shadow: var(--shadow-inner);
      }

      .quiz-stem {
        font-size: 18px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.6;
      }

      /* Quiz Options — 微拟态浮雕卡片 */
      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .quiz-option {
        display: flex;
        align-items: center;
        gap: 16px;
        width: 100%;
        padding: 14px 18px;
        border-radius: 16px;
        border: 2px solid var(--yellow-light);
        background: var(--bg-canvas);
        box-shadow: var(--shadow-soft);
        font-family: inherit;
        font-size: 15px;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 220ms ease;
        text-align: left;
      }

      .quiz-option:hover {
        border-color: var(--yellow-light);
        background: var(--yellow-mist);
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
      }

      .quiz-option.selected {
        border-color: var(--yellow);
        background: var(--yellow-lighter);
        box-shadow:
          var(--shadow-inner),
          0 0 0 3px rgba(255, 224, 131, 0.18);
        transform: translateY(0);
      }

      .option-label {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          var(--yellow-lighter) 0%,
          var(--yellow-light) 100%
        );
        box-shadow:
          3px 3px 6px rgba(228, 200, 166, 0.25),
          -3px -3px 6px rgba(255, 255, 255, 0.9);
        font-size: 14px;
        font-weight: 700;
        color: var(--brown-medium);
        flex-shrink: 0;
        transition: all 200ms ease;
      }

      .quiz-option:hover .option-label {
        background: linear-gradient(
          135deg,
          var(--yellow-lighter) 0%,
          var(--yellow-light) 100%
        );
      }

      .quiz-option.selected .option-label {
        background: linear-gradient(
          135deg,
          var(--yellow-light) 0%,
          var(--yellow) 100%
        );
        color: var(--brown-dark);
        box-shadow:
          inset 2px 2px 4px rgba(0, 0, 0, 0.1),
          inset -2px -2px 4px rgba(255, 255, 255, 0.3);
      }

      .option-text {
        flex: 1;
        line-height: 1.5;
        font-weight: 500;
      }

      /* Confidence Buttons */
      .confidence-section {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-top: 8px;
        padding-top: 20px;
        border-top: 1px dashed rgba(196, 168, 130, 0.3);
      }

      .confidence-label {
        font-size: 15px;
        font-weight: 700;
        color: var(--brown-deep);
      }

      .confidence-buttons {
        display: flex;
        gap: 12px;
      }

      .confidence-btn {
        flex: 1;
        padding: 14px 16px; /* 增加高度，与大按钮对齐 */
        border-radius: 9999px; /* 使用胶囊大圆角 */
        border: none;
        font-family: inherit;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 220ms ease;
        box-shadow: var(--shadow-soft); /* 统一的微拟态外阴影 */
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      /* 我不会 — 默认浅红 */
      .confidence-btn.dont-know {
        color: var(--warn-text);
        background: linear-gradient(
          135deg,
          rgba(251, 221, 214, 0.6) 0%,
          rgba(255, 212, 202, 0.9) 100%
        );
      }

      .confidence-btn.dont-know:hover {
        background: linear-gradient(
          135deg,
          rgba(251, 221, 214, 0.8) 0%,
          rgb(252, 189, 177) 100%
        );
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
      }

      .confidence-btn.dont-know.active {
        background: linear-gradient(135deg, #fbddd6 0%, #f5b8ac 100%);
        box-shadow:
          var(--shadow-inner),
          inset 0 0 0 2px rgba(200, 74, 43, 0.2);
        transform: translateY(0);
      }

      /* 我不确定 — 默认浅黄 */
      .confidence-btn.uncertain {
        color: #b8860b;
        background: linear-gradient(
          135deg,
          rgba(252, 231, 166, 0.63) 0%,
          rgba(255, 237, 166, 0.9) 100%
        );
      }

      .confidence-btn.uncertain:hover {
        background: linear-gradient(
          135deg,
          rgba(255, 236, 179, 0.8) 0%,
          rgb(255, 223, 126) 100%
        );
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
      }

      .confidence-btn.uncertain.active {
        background: linear-gradient(
          135deg,
          var(--yellow-light) 0%,
          var(--yellow) 100%
        );
        box-shadow:
          var(--shadow-inner),
          inset 0 0 0 2px rgba(247, 215, 121, 0.4);
        transform: translateY(0);
      }

      /* 我会 — N2W 浅蓝色风格 */
      .confidence-btn.know {
        color: var(--blue);
        background: linear-gradient(
          135deg,
          rgba(229, 240, 253, 0.6) 0%,
          rgba(197, 222, 251, 0.9) 100%
        );
      }

      .confidence-btn.know:hover {
        background: linear-gradient(
          135deg,
          rgba(190, 224, 255, 0.85) 0%,
          var(--blue-mist) 100%
        );
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
      }

      .confidence-btn.know.active {
        background: linear-gradient(
          135deg,
          var(--blue-mist) 0%,
          var(--blue-lighter) 100%
        );
        box-shadow:
          var(--shadow-inner),
          inset 0 0 0 2px rgba(0, 102, 204, 0.2);
        transform: translateY(0);
      }

      /* =============================================
       Responsive
       ============================================= */
      @media (max-width: 540px) {
        .card-content {
          padding: 28px 24px;
          gap: 20px;
        }

        .onboarding-title {
          font-size: 22px;
        }

        .brand-icon {
          width: 52px;
          height: 52px;
          font-size: 24px;
          border-radius: 16px;
        }

        .confidence-buttons {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useMemo, useCallback, useRef, useEffect } = React;

      /* =============================================
       Language Options
       ============================================= */
      const languageOptions = [
        { value: "Python", label: "Python" },
        { value: "Java", label: "Java" },
        { value: "C++", label: "C++" },
        { value: "C", label: "C" },
        { value: "Go", label: "Go" },
        { value: "Rust", label: "Rust" },
      ];

      const durationOptions = [
        { value: 3, label: "3 天" },
        { value: 7, label: "7 天" },
        { value: 15, label: "15 天" },
        { value: 30, label: "30 天" },
      ];

      /* =============================================
       CustomSelect Component
       ============================================= */
      function CustomSelect({ value, onChange, options, icon }) {
        const [isOpen, setIsOpen] = useState(false);
        const ref = useRef(null);

        // 点击外部关闭
        useEffect(() => {
          const handleClickOutside = (e) => {
            if (ref.current && !ref.current.contains(e.target)) {
              setIsOpen(false);
            }
          };
          document.addEventListener("mousedown", handleClickOutside);
          return () =>
            document.removeEventListener("mousedown", handleClickOutside);
        }, []);

        const selectedOption = options.find((o) => o.value === value);

        return (
          <div className="custom-select" ref={ref}>
            <div
              className={`custom-select-trigger ${isOpen ? "open" : ""}`}
              onClick={() => setIsOpen(!isOpen)}
            >
              <span>{selectedOption ? selectedOption.label : "请选择"}</span>
              <svg
                className="custom-select-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>
            {isOpen && (
              <div className="custom-select-menu">
                {options.map((option) => (
                  <button
                    key={option.value}
                    type="button"
                    className={`custom-select-option ${value === option.value ? "active" : ""}`}
                    onClick={() => {
                      onChange(option.value);
                      setIsOpen(false);
                    }}
                  >
                    <svg
                      className="check-icon"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      strokeWidth="2.5"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    >
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <span className="option-name">
                      {option.icon && (
                        <span style={{ marginRight: 8 }}>{option.icon}</span>
                      )}
                      {option.label}
                    </span>
                  </button>
                ))}
              </div>
            )}
          </div>
        );
      }

      /* =============================================
       Mock Data
       ============================================= */
      const mockQuestions = [
        {
          question: "以下哪个是 Python 中定义函数的关键字？",
          options: ["function", "def", "func", "define"],
          answer: "def",
          knowledge_point: "函数定义",
        },
        {
          question: "在 Python 中，以下哪个数据类型是不可变的？",
          options: [
            "list（列表）",
            "dict（字典）",
            "tuple（元组）",
            "set（集合）",
          ],
          answer: "tuple（元组）",
          knowledge_point: "数据类型",
        },
        {
          question: "以下代码的输出是什么？\n\nprint(type([]))",
          options: [
            "<class 'array'>",
            "<class 'list'>",
            "<class 'tuple'>",
            "<class 'set'>",
          ],
          answer: "<class 'list'>",
          knowledge_point: "类型检查",
        },
      ];

      /* =============================================
       OnboardingModal Component
       ============================================= */
      function OnboardingModal() {
        // 阶段状态机：form → generating → quiz
        const [step, setStep] = useState("form");

        // 表单状态
        const [form, setForm] = useState({
          language: "Python",
          duration: 7,
          supplements: "",
        });
        const [errorMessage, setErrorMessage] = useState(null);
        const [isSubmitting, setIsSubmitting] = useState(false);

        // 答题状态
        const [currentIndex, setCurrentIndex] = useState(0);
        const [selectedAnswer, setSelectedAnswer] = useState(null);
        const [confidence, setConfidence] = useState(null);
        const [loadingText, setLoadingText] = useState("正在连接 AI 大脑...");

        // 当前题目
        const currentQuestion = mockQuestions[currentIndex];
        const isLastQuestion = currentIndex === mockQuestions.length - 1;

        // 表单字段更新
        const handleChange = useCallback((field, value) => {
          setForm((prev) => ({ ...prev, [field]: value }));
          setErrorMessage(null);
        }, []);

        // 提交表单
        const handleSubmit = useCallback(
          async (e) => {
            e.preventDefault();
            if (isSubmitting) return;

            // 简单验证
            if (!form.language.trim()) {
              setErrorMessage("请输入目标编程语言");
              return;
            }
            if (form.duration > 30) {
              setErrorMessage("学习周期不能超过 30 天");
              return;
            }

            setIsSubmitting(true);

            // 模拟 API 调用
            await new Promise((resolve) => setTimeout(resolve, 800));

            // 跳转到测评页面
            window.location.href = "./pretest-board-preview.html";
          },
          [form, isSubmitting],
        );

        // 选择答案
        const handleSelectAnswer = useCallback((option) => {
          setSelectedAnswer(option);
        }, []);

        // 选择置信度
        const handleSelectConfidence = useCallback((level) => {
          setConfidence(level);
        }, []);

        // 下一题 / 完成
        const handleNext = useCallback(async () => {
          if (!selectedAnswer || !confidence) return;

          if (isLastQuestion) {
            // 完成测验，进入生成学习计划
            setStep("generating");
            setLoadingText("AI 正在生成你的个性化学习计划...");

            await new Promise((resolve) => setTimeout(resolve, 2000));

            alert("✅ 学习计划生成成功！（这是前端演示）");
            // 实际应用中这里会关闭弹窗并显示学习计划
          } else {
            // 下一题
            setCurrentIndex((prev) => prev + 1);
            setSelectedAnswer(null);
            setConfidence(null);
          }
        }, [selectedAnswer, confidence, isLastQuestion]);

        // 提前结束
        const handleEndQuiz = useCallback(async () => {
          setStep("generating");
          setLoadingText("AI 正在根据已答题目生成学习计划...");

          await new Promise((resolve) => setTimeout(resolve, 2000));

          alert("✅ 学习计划生成成功！（这是前端演示）");
        }, []);

        // ========================
        // 渲染：表单阶段
        // ========================
        const renderForm = () => (
          <div className="onboarding-card">
            <div className="accent-bar" />
            <div className="card-content">
              {/* Brand Icon */}
              <div className="brand-icon">📋</div>

              {/* Header */}
              <div className="onboarding-header">
                <h2 className="onboarding-title">定制你的学习计划</h2>
                <p className="onboarding-subtitle">
                  帮助我们为你量身定制学习路线
                </p>
              </div>

              {/* Error Message */}
              {errorMessage && (
                <div className="error-box shake-anim">
                  <span className="error-icon">⚠️</span>
                  <span>{errorMessage}</span>
                </div>
              )}

              {/* Form Fields */}
              <form className="form-group" onSubmit={handleSubmit}>
                <div style={{ display: "flex", gap: "16px" }}>
                  {/* 示例代码语言 */}
                  <div className="field-wrapper" style={{ flex: 1 }}>
                    <label className="field-label">偏好的示例语言</label>
                    <div className="input-wrapper">
                      <span className="input-icon">💻</span>
                      <CustomSelect
                        value={form.language}
                        onChange={(val) => handleChange("language", val)}
                        options={languageOptions}
                      />
                    </div>
                  </div>

                  {/* 总学习周期 */}
                  <div className="field-wrapper" style={{ flex: 1 }}>
                    <label className="field-label">总学习周期</label>
                    <div className="input-wrapper">
                      <span className="input-icon">📅</span>
                      <CustomSelect
                        value={form.duration}
                        onChange={(val) =>
                          handleChange("duration", parseInt(val))
                        }
                        options={durationOptions}
                      />
                    </div>
                  </div>
                </div>

                {/* 补充说明 */}
                <div className="field-wrapper">
                  <label className="field-label">学习目标和补充信息</label>
                  <textarea
                    className="onboarding-textarea"
                    placeholder="我想学完 Python 的基础内容，我数学能力强，编程能力弱"
                    value={form.supplements}
                    onChange={(e) =>
                      handleChange("supplements", e.target.value)
                    }
                  />
                </div>

                {/* Submit Button */}
                <button
                  type="submit"
                  className="submit-btn"
                  disabled={isSubmitting}
                >
                  {isSubmitting && <div className="btn-spinner" />}
                  {isSubmitting ? "提交中..." : "🚀 开始学习之旅"}
                </button>
              </form>
            </div>
          </div>
        );

        // ========================
        // 渲染：加载阶段
        // ========================
        const renderGenerating = () => (
          <div className="onboarding-card">
            <div className="accent-bar" />
            <div className="card-content">
              <div className="generating-container">
                <div className="generating-spinner" />
                <p className="generating-text">{loadingText}</p>
              </div>
            </div>
          </div>
        );

        // ========================
        // 渲染：答题阶段
        // ========================
        const renderQuiz = () => (
          <div className="onboarding-card wide">
            <div className="accent-bar" />
            <div className="card-content">
              {/* Brand Icon */}
              <div className="brand-icon">📝</div>

              {/* Header */}
              <div className="quiz-header">
                <div className="quiz-header-top">
                  <span className="quiz-progress">
                    {currentIndex + 1} / {mockQuestions.length}
                  </span>
                  <button
                    type="button"
                    className="quiz-end-btn"
                    onClick={handleEndQuiz}
                  >
                    结束测验
                  </button>
                </div>
                {/* Progress Bar */}
                <div className="quiz-progress-bar">
                  <div
                    className="quiz-progress-fill"
                    style={{
                      width: `${((currentIndex + 1) / mockQuestions.length) * 100}%`,
                    }}
                  />
                </div>
              </div>

              {/* Question Stem */}
              <div className="quiz-stem" style={{ whiteSpace: "pre-wrap" }}>
                {currentQuestion.question}
              </div>

              {/* Options */}
              <div className="quiz-options">
                {currentQuestion.options.map((option, index) => (
                  <button
                    key={index}
                    type="button"
                    className={`quiz-option ${selectedAnswer === option ? "selected" : ""}`}
                    onClick={() => handleSelectAnswer(option)}
                  >
                    <span className="option-label">
                      {String.fromCharCode(65 + index)}
                    </span>
                    <span className="option-text">{option}</span>
                  </button>
                ))}
              </div>

              {/* Confidence Buttons */}
              <div className="confidence-section">
                <label className="confidence-label">
                  你对这道题的把握程度：
                </label>
                <div className="confidence-buttons">
                  <button
                    type="button"
                    className={`confidence-btn dont-know ${confidence === "我不会" ? "active" : ""}`}
                    onClick={() => handleSelectConfidence("我不会")}
                  >
                    我不会
                  </button>
                  <button
                    type="button"
                    className={`confidence-btn uncertain ${confidence === "我不确定" ? "active" : ""}`}
                    onClick={() => handleSelectConfidence("我不确定")}
                  >
                    我不确定
                  </button>
                  <button
                    type="button"
                    className={`confidence-btn know ${confidence === "我会" ? "active" : ""}`}
                    onClick={() => handleSelectConfidence("我会")}
                  >
                    我会
                  </button>
                </div>
              </div>

              {/* Submit Button */}
              <button
                type="button"
                className="submit-btn"
                disabled={!selectedAnswer || !confidence}
                onClick={handleNext}
              >
                {isLastQuestion ? "✨ 完成测验" : "➡️ 下一题"}
              </button>
            </div>
          </div>
        );

        // ========================
        // 主渲染
        // ========================
        return (
          <div className="onboarding-overlay">
            {/* Decorative Blobs */}
            <div className="blob blob-orange" />
            <div className="blob blob-blue" />
            <div className="blob blob-yellow" />

            {/* Content */}
            {step === "form" && renderForm()}
            {step === "generating" && renderGenerating()}
            {step === "quiz" && renderQuiz()}
          </div>
        );
      }

      /* =============================================
       Render
       ============================================= */
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<OnboardingModal />);
    </script>
  </body>
</html>
